name: Boilerplate

on:
  pull_request:
    branches:
      - 'main'

permissions: {}

jobs:
  check:
    name: Boilerplate Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        extension:
        - go
        - sh
        - yaml

        # Map between extension and human-readable name.
        include:
        - extension: go
          language: Go
        - extension: sh
          language: Bash
        - extension: yaml
          language: YAML
        - extension: yml
          language: YAML

    steps:
      - name: Check out code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: chainguard-dev/actions/boilerplate@fabe4ed3f66ceb5f8ec86ed7ae6d0c945ca362fb # v1.6.28
        with:
          extension: ${{ matrix.extension }}
          language: ${{ matrix.language }}
