name: Boilerplate

on:
  pull_request:
    branches:
      - 'main'

permissions: {}

jobs:
  check:
    name: Boilerplate Check
    runs-on: ubuntu-latest

    permissions:
      contents: read

    strategy:
      fail-fast: false # Keep running if one leg fails.
      matrix:
        extension:
        - go
        - sh
        - yaml

        # Map between extension and human-readable name.
        include:
        - extension: go
          language: Go
        - extension: sh
          language: Bash
        - extension: yaml
          language: YAML
        - extension: yml
          language: YAML

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: chainguard-dev/actions/boilerplate@9978bf17926f53444b5eff45479954d94ec12e32 # v1.6.24
        with:
          extension: ${{ matrix.extension }}
          language: ${{ matrix.language }}
